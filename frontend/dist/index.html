<!DOCTYPE html>
<html lang="en" class="scroll-smooth dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;500;600;800&family=Space+Grotesk:wght@400;500;600&display=swap');
    
    body {
      background-color: #09090b; /* zinc-950 */
      color: #fafafa; /* zinc-50 */
      overflow-x: hidden;
    }
    
    @media (pointer: fine) {
      body {
        cursor: none;
      }
      a, button, [role="button"] {
        cursor: none;
      }
    }
    
    /* Subtle noise texture overlay */
    
    .bg-noise {
      position: fixed;
      inset: 0;
      z-index: 50;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
    }
    
    /* Tech Grid Background */
    
    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-size: 50px 50px;
      background-image: 
        linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      mask-image: radial-gradient(circle at center, black, transparent 80%);
      -webkit-mask-image: radial-gradient(circle at center, black, transparent 80%);
    }
    
    /* Custom scrollbar */
    
    ::-webkit-scrollbar {
      width: 6px;
    }
    
    ::-webkit-scrollbar-track {
      background: #09090b; 
    }
    
    ::-webkit-scrollbar-thumb {
      background: #27272a; 
      border-radius: 10px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #10b981; 
    }
    
    /* Scroll Reveal Base Classes */
    
    .reveal {
      opacity: 0;
      transform: translateY(40px) scale(0.98);
      transition: opacity 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
      will-change: opacity, transform;
    }
    
    .reveal.is-visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    
    /* Spotlight effect */
    
    .spotlight {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: radial-gradient(800px circle at var(--mouse-x) var(--mouse-y), rgba(16, 185, 129, 0.04), transparent 40%);
      transition: background 0.1s ease;
    }
    
    /* Custom Cursor Styles */
    
    .cursor-dot {
      position: fixed;
      top: 0;
      left: 0;
      width: 8px;
      height: 8px;
      background-color: #10b981;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s, background-color 0.2s;
    }
    
    .cursor-outline {
      position: fixed;
      top: 0;
      left: 0;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(16, 185, 129, 0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s, background-color 0.2s, border-color 0.2s;
    }
    
    .cursor-hover .cursor-dot {
      width: 0;
      height: 0;
    }
    
    .cursor-hover .cursor-outline {
      width: 60px;
      height: 60px;
      background-color: rgba(16, 185, 129, 0.1);
      border-color: rgba(16, 185, 129, 0.8);
      backdrop-filter: blur(2px);
    }
    
    /* Glowing Border Card Effect */
    
    .glow-card {
      position: relative;
    }
    
    .glow-card::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(to bottom right, rgba(255,255,255,0.1), rgba(255,255,255,0.01));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      transition: background 0.5s ease;
    }
    
    .glow-card:hover::before {
      background: linear-gradient(to bottom right, #10b981, rgba(16, 185, 129, 0.1));
    }
    
    /* Hide scrollbar for marquee */
    
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>

<body class="antialiased selection:bg-accent/30 selection:text-accent">
  <div class="bg-noise"></div>
  <div class="bg-grid"></div>
  <div id="spotlight" class="spotlight" style="--mouse-x: 50vw; --mouse-y: 50vh;"></div>
  <div id="root" class="relative z-10"></div>
  
  <script>
    // Handle spotlight effect outside React for better performance
    const spotlight = document.getElementById('spotlight');
    window.addEventListener('mousemove', (e) => {
      spotlight.style.setProperty('--mouse-x', `${e.clientX}px`);
      spotlight.style.setProperty('--mouse-y', `${e.clientY}px`);
    });
  </script></body>
</html>
